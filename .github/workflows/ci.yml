name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# 동시 실행 중복 막기 (같은 PR 에 push 연달아 들어오면 이전 실행 취소).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (renju / rating / game-logic / parity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: omok/server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: omok/server/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  e2e-recovery:
    name: E2E (WebSocket recovery / rating / spectator)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 일부 시나리오 (B1-B3, RK1, RK3) 가 누적 상태 leak 으로 flaky.
    # 이슈 #34 의 후속 작업으로 안정화 예정 — 지금은 비-blocking 으로 결과만 노출.
    continue-on-error: true
    defaults:
      run:
        working-directory: omok/server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: omok/server/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Run E2E (memory backend)
        run: npm test
