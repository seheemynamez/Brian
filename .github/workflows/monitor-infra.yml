name: monitor-infra

# Render + Aiven 메트릭 수집 + 임계 검사 + GitHub Issue 알림.
# 매 30분 cron. 수동 실행 (workflow_dispatch) 도 가능.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# 동시 실행 방지 — 30분 주기라 중첩될 일은 거의 없지만 안전망.
concurrency:
  group: monitor-infra
  cancel-in-progress: false

permissions:
  contents: write   # metrics/ commit
  issues: write     # alert Issue 생성

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # commit 위해 token 으로 fetch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run monitor
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          AIVEN_API_TOKEN: ${{ secrets.AIVEN_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/monitor.py

      - name: Commit metrics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add metrics/
          if git diff --staged --quiet; then
            echo 'no metrics changes'
          else
            git commit -m "chore(monitor): metrics ${{ github.run_id }}"
            git push
          fi
