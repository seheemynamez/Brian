name: monitor-infra

# Render + Aiven 메트릭 수집 + 임계 검사 + GitHub Issue 알림.
#
# 두 cron (정각 high-load 회피 위해 7분/37분 offset):
#   매시 7분, 37분 — collect 모드: 메트릭 snapshot + 임계 검사 + alert Issue.
#   매일 UTC 00:07 (KST 09:07) — daily-summary 모드: 24h+7d 요약 + 이전 daily-summary close.
#
# 왜 7분/37분?
#   GitHub Actions schedule cron 은 정각/30분 같은 high-load 시간에 skip 되기 쉬움.
#   공식 docs: "schedule event can be delayed during periods of high loads ... High load
#   times include the start of every hour. To decrease the chance of delay, schedule
#   your workflow to run at a different time of the hour."
#   PR #84 초기엔 '*/30 * * * *' 였으나 6시간 동안 schedule event 0건 → 7,37 으로 변경.

on:
  schedule:
    - cron: '7,37 * * * *'  # collect (매시 7분 / 37분)
    - cron: '7 0 * * *'     # daily-summary (UTC 00:07 = KST 09:07)
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'collect'
        type: choice
        options:
          - collect
          - daily-summary

concurrency:
  group: monitor-infra-${{ github.event.schedule || github.event.inputs.mode || 'collect' }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine mode
        id: mode
        # cron 별 모드 선택: '7 0 * * *' (하루 1회 UTC 00:07) 면 daily-summary, 그 외 collect.
        # workflow_dispatch input 우선.
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [ -n "$INPUT" ]; then
            echo "mode=$INPUT" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "7 0 * * *" ]; then
            echo "mode=daily-summary" >> "$GITHUB_OUTPUT"
          else
            echo "mode=collect" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monitor
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          AIVEN_API_TOKEN: ${{ secrets.AIVEN_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/monitor.py

      - name: Commit metrics (collect mode only)
        if: steps.mode.outputs.mode == 'collect'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add metrics/
          if git diff --staged --quiet; then
            echo 'no metrics changes'
          else
            git commit -m "chore(monitor): metrics ${{ github.run_id }}"
            git push
          fi
