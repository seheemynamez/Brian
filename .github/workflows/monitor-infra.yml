name: monitor-infra

# Render + Aiven 메트릭 수집 + 임계 검사 + GitHub Issue 알림.
#
# Trigger 정책 — 외부 ping 만 사용 (GitHub schedule fallback 없음):
#   1) workflow_dispatch — cron-job.org 가 매 5분 (collect) / 매일 KST 09:00 (daily-summary)
#      에 PAT 으로 trigger. 이게 유일한 정기 실행 경로.
#   2) repository_dispatch (event_type: 'monitor-collect' / 'monitor-daily-summary') —
#      향후 GCP Cloud Scheduler 같은 더 신뢰도 높은 외부 trigger 옵션 위해 enabled.
#   3) GitHub Actions schedule 은 의도적으로 제거 — best-effort 라 신뢰도 ↓, 외부 ping
#      과 중복 fire 시 자원/Issue 노이즈만 늘림. cron-job.org primary 가 안 깨지는 한
#      schedule fallback 가치 < 비용.
#
# concurrency lock: 외부 ping + 수동 trigger 가 짧은 시간 중복 호출돼도 한 번에 1
# 인스턴스만 실행. cancel-in-progress=false 라 진행 중인 collect 안 끊고 새 trigger
# 는 큐에 대기 또는 skip.
#
# 외부 ping setup 절차: docs/MONITOR_RELIABILITY.md 참고.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'collect'
        type: choice
        options:
          - collect
          - daily-summary
  repository_dispatch:
    types: [monitor-collect, monitor-daily-summary]

concurrency:
  # 단일 group key — 모든 trigger 한 group. 중복 fire 시 한 번만 실행.
  group: monitor-infra
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine mode
        id: mode
        # Trigger 별 mode 매핑:
        #   workflow_dispatch input → 그대로 (cron-job.org 가 body 에 명시 / 수동 실행)
        #   repository_dispatch event_type='monitor-daily-summary' → daily-summary
        #   repository_dispatch event_type='monitor-collect' → collect
        #   default → collect (안전한 fallback)
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          ACTION="${{ github.event.action }}"
          if [ -n "$INPUT" ]; then
            echo "mode=$INPUT" >> "$GITHUB_OUTPUT"
          elif [ "$ACTION" = "monitor-daily-summary" ]; then
            echo "mode=daily-summary" >> "$GITHUB_OUTPUT"
          else
            echo "mode=collect" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monitor
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          AIVEN_API_TOKEN: ${{ secrets.AIVEN_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/monitor.py

      - name: Commit metrics (collect mode only)
        if: steps.mode.outputs.mode == 'collect'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add metrics/
          if git diff --staged --quiet; then
            echo 'no metrics changes'
          else
            git commit -m "chore(monitor): metrics ${{ github.run_id }}"
            git push
          fi
