name: monitor-infra

# Render + Aiven 메트릭 수집 + 임계 검사 + GitHub Issue 알림.
#
# 두 cron:
#   매 30분 — collect 모드: 메트릭 snapshot + 임계 검사 + alert Issue (cooldown 6h).
#   매일 00:00 UTC (09:00 KST) — daily-summary 모드: 24h+7d 요약 Issue 생성 +
#                                이전 daily-summary Issue 자동 close.

on:
  schedule:
    - cron: '*/30 * * * *'  # collect (매 30분)
    - cron: '0 0 * * *'     # daily-summary (UTC 00:00 = KST 09:00)
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'collect'
        type: choice
        options:
          - collect
          - daily-summary

concurrency:
  group: monitor-infra-${{ github.event.schedule || github.event.inputs.mode || 'collect' }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine mode
        id: mode
        # cron 별 모드 선택: '0 0 * * *' 면 daily, 그 외 collect
        # workflow_dispatch input 우선
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [ -n "$INPUT" ]; then
            echo "mode=$INPUT" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "0 0 * * *" ]; then
            echo "mode=daily-summary" >> "$GITHUB_OUTPUT"
          else
            echo "mode=collect" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monitor
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          AIVEN_API_TOKEN: ${{ secrets.AIVEN_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/monitor.py

      - name: Commit metrics (collect mode only)
        if: steps.mode.outputs.mode == 'collect'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add metrics/
          if git diff --staged --quiet; then
            echo 'no metrics changes'
          else
            git commit -m "chore(monitor): metrics ${{ github.run_id }}"
            git push
          fi
