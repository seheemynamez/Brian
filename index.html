<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sehee's Mini Games — 호스트 루트로 이동합니다</title>

  <!-- 이 페이지는 호스트 루트로 리다이렉트하는 stub 입니다.
       검색엔진 인덱싱 X, canonical 은 도착지로 위임. -->
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://seheemynamez.github.io/">
  <meta http-equiv="refresh" content="0; url=https://seheemynamez.github.io/">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #0b0a1f;
      color: #b0a8d4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      text-align: center;
      line-height: 1.6;
    }
    a { color: #00e5ff; text-decoration: none; border-bottom: 1px dashed currentColor; }
    a:hover { color: #b388ff; }
    .stack { max-width: 460px; }
    h1 { font-size: 18px; font-weight: 700; margin: 0 0 12px; color: #e8e6ff; }
    p { margin: 0 0 8px; font-size: 14px; }
  </style>
</head>
<body>
  <main class="stack">
    <h1>새 주소로 이동 중…</h1>
    <p>이 페이지는 <a href="https://seheemynamez.github.io/">https://seheemynamez.github.io/</a> 로 이동합니다.</p>
    <p>자동으로 이동되지 않으면 위 링크를 눌러주세요.</p>
  </main>
  <script>
    // meta refresh 못 따라가는 환경 보조 (검색 봇은 meta refresh 만 따라가도 OK)
    location.replace('https://seheemynamez.github.io/');
  </script>
</body>
</html>
