# Render Blueprint
# 사용법: Render 대시보드 → New → Blueprint → Brian 레포 선택 → Connect
# 이후 main에 push할 때마다 자동 재배포됩니다.

services:
  - type: web
    name: omok-server
    runtime: node
    region: singapore         # 한국에서 가장 가까운 리전
    plan: free                # 무료 (15분 무활동 시 sleep, 첫 접속 콜드스타트 ~30초)
    rootDir: omok/server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        # 쉼표 구분. Pages 도메인만 허용.
        value: https://seheemynamez.github.io
      - key: CANONICAL_OMOK_URL
        # /i/CODE 초대 페이지가 사람을 보낼 canonical 게임 URL.
        # 봇은 OG 메타만 읽고, 사람은 여기로 redirect 된다.
        value: https://seheemynamez.github.io/Brian/omok/

  - type: web
    name: 2048-server
    runtime: node
    region: singapore         # omok 과 동일 — 같은 Aiven valkey 와 가까이
    plan: free
    rootDir: 2048/server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/stats
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORE_BACKEND
        value: valkey
      - key: VALKEY_KEY_PREFIX
        # omok 의 `omok:prod` 와 namespace 격리.
        value: 2048:prod
      - key: VALKEY_URL
        # Aiven Connection URI. omok 과 동일 값 (같은 인스턴스 공유).
        sync: false  # dashboard 에서 등록
      - key: ALLOWED_ORIGINS
        value: https://seheemynamez.github.io
      - key: CANONICAL_2048_URL
        # /i/2048/... 초대 페이지가 사람을 보낼 canonical 게임 URL.
        value: https://seheemynamez.github.io/Brian/2048/
